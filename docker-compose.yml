version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spacehub-backend
    restart: unless-stopped
    ports:
      - "${APP_PORT}:${APP_INTERNAL_PORT}"
    env_file:
      - .env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:${POSTGRES_PORT}/${POSTGRES_DB}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
    depends_on:
      - postgres
      - redis
    networks:
      - spacehub-net

  postgres:
    image: postgres:15-alpine
    container_name: spacehub-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_INTERNAL_PORT}"
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${SPRING_DATASOURCE_USERNAME}
      - POSTGRES_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - spacehub-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: spacehub-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:${REDIS_INTERNAL_PORT}"
    volumes:
      - redis-data:/data
    networks:
      - spacehub-net

networks:
  spacehub-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
